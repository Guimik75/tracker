<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Rally Race</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#1a1a2e;width:100%;height:100%;overflow:hidden;font-family:'Arial',sans-serif}
canvas{display:block;touch-action:none}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none}
#hud{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px}
.hud-box{background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 14px;backdrop-filter:blur(4px)}
.hud-label{font-size:9px;letter-spacing:2px;color:#888;text-transform:uppercase}
.hud-value{font-size:22px;font-weight:700;color:#fff;line-height:1.1}
.hud-value.green{color:#4ecca3}
.hud-value.yellow{color:#f7b731}
.hud-value.red{color:#ff6b6b}
#lap-times{position:fixed;top:80px;right:16px;pointer-events:none}
.lap-row{background:rgba(0,0,0,0.5);border-radius:6px;padding:4px 10px;margin-bottom:4px;font-size:11px;color:#aaa;text-align:right}
.lap-row.best{color:#4ecca3;font-weight:700}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;text-align:center}
#msg-text{font-size:48px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(78,204,163,0.8);opacity:0;transition:opacity 0.3s;letter-spacing:3px}
#controls{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:flex-end;padding:20px;pointer-events:none}
.ctrl-group{display:flex;gap:10px;pointer-events:all}
.ctrl-btn{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background 0.1s;backdrop-filter:blur(4px)}
.ctrl-btn:active,.ctrl-btn.pressed{background:rgba(255,255,255,0.3)}
#btn-gas{background:rgba(78,204,163,0.25);border-color:rgba(78,204,163,0.6)}
#btn-brake{background:rgba(255,107,107,0.25);border-color:rgba(255,107,107,0.6)}
#minimap{position:fixed;bottom:110px;right:16px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.5);overflow:hidden}
#screen-menu,#screen-end{position:fixed;inset:0;background:linear-gradient(135deg,#0f0f23,#1a1a3e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#screen-end{display:none}
h1.game-title{font-size:52px;font-weight:900;color:#fff;letter-spacing:6px;text-shadow:0 0 40px rgba(78,204,163,0.6)}
.subtitle{font-size:13px;letter-spacing:4px;color:#4ecca3;text-transform:uppercase}
.menu-btn{background:linear-gradient(135deg,#4ecca3,#45b393);border:none;border-radius:50px;padding:16px 48px;font-size:18px;font-weight:700;color:#0f0f23;cursor:pointer;letter-spacing:2px;transition:transform 0.1s,box-shadow 0.1s;box-shadow:0 4px 20px rgba(78,204,163,0.4)}
.menu-btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(78,204,163,0.6)}
.track-select{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px}
.track-card{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.15);border-radius:14px;padding:16px 22px;cursor:pointer;text-align:center;transition:all 0.2s;min-width:120px}
.track-card:hover,.track-card.active{border-color:#4ecca3;background:rgba(78,204,163,0.15)}
.track-card .t-name{font-size:13px;font-weight:700;color:#fff}
.track-card .t-diff{font-size:10px;color:#888;margin-top:3px;letter-spacing:1px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:340px;width:100%}
.stat-box{background:rgba(255,255,255,0.07);border-radius:12px;padding:14px;text-align:center}
.stat-box .sv{font-size:28px;font-weight:800;color:#4ecca3}
.stat-box .sl{font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
#kb-hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:10px;color:#444;letter-spacing:1px;pointer-events:none}
</style>
</head>
<body>

<!-- MENU -->
<div id="screen-menu">
  <h1 class="game-title">RALLY</h1>
  <div class="subtitle">Championship</div>
  <div style="height:8px"></div>
  <div style="font-size:11px;color:#555;letter-spacing:2px">CHOIX DU CIRCUIT</div>
  <div class="track-select" id="track-select"></div>
  <button class="menu-btn" id="btn-start">DEMARRER</button>
  <div style="font-size:11px;color:#444;letter-spacing:1px">Fleches / WASD · Touche ecran mobile</div>
</div>

<!-- END SCREEN -->
<div id="screen-end">
  <div class="subtitle">COURSE TERMINEE</div>
  <h1 class="game-title" style="font-size:36px" id="end-title">3 TOURS</h1>
  <div class="stats-grid" id="end-stats"></div>
  <button class="menu-btn" id="btn-replay">REJOUER</button>
  <button class="menu-btn" style="background:rgba(255,255,255,0.1);color:#fff;box-shadow:none" id="btn-menu2">MENU</button>
</div>

<!-- GAME UI -->
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">Vitesse</div>
      <div class="hud-value" id="h-speed">0</div>
    </div>
    <div class="hud-box" style="text-align:center">
      <div class="hud-label">Tour</div>
      <div class="hud-value green" id="h-lap">1 / 3</div>
    </div>
    <div class="hud-box" style="text-align:right">
      <div class="hud-label">Temps</div>
      <div class="hud-value yellow" id="h-time">0:00.000</div>
    </div>
  </div>
</div>
<div id="lap-times"></div>
<div id="msg"><div id="msg-text"></div></div>
<div id="controls">
  <div class="ctrl-group">
    <div class="ctrl-btn" id="btn-left">◀</div>
    <div class="ctrl-btn" id="btn-right">▶</div>
  </div>
  <div class="ctrl-group" style="flex-direction:column-reverse">
    <div class="ctrl-btn" id="btn-brake">⬇</div>
    <div class="ctrl-btn" id="btn-gas">⬆</div>
  </div>
</div>
<canvas id="minimap" width="100" height="100"></canvas>
<div id="kb-hint">↑↓←→ ou WASD pour conduire</div>

<script>
// ─── TRACK DEFINITIONS ───────────────────────────────────────────────────────
const TRACKS = [
  {
    name: "Monte Carlo",
    diff: "FACILE",
    laps: 3,
    color: "#4ecca3",
    // Waypoints as normalized [0..1] coords, track width
    width: 92,
    points: [
      [0.5,0.12],[0.78,0.12],[0.88,0.22],[0.88,0.42],[0.78,0.55],
      [0.62,0.55],[0.55,0.65],[0.55,0.82],[0.65,0.88],[0.75,0.88],
      [0.82,0.82],[0.82,0.68],[0.72,0.62],[0.62,0.68],[0.62,0.78],
      [0.55,0.88],[0.42,0.88],[0.35,0.78],[0.35,0.65],[0.22,0.58],
      [0.12,0.45],[0.12,0.28],[0.22,0.15],[0.35,0.12],[0.5,0.12]
    ]
  },
  {
    name: "Safari Kenya",
    diff: "MOYEN",
    laps: 3,
    color: "#f7b731",
    width: 80,
    points: [
      [0.5,0.1],[0.72,0.1],[0.88,0.18],[0.92,0.35],[0.85,0.5],
      [0.72,0.52],[0.68,0.65],[0.78,0.75],[0.88,0.72],[0.92,0.6],
      [0.88,0.5],[0.78,0.48],[0.68,0.55],[0.65,0.7],[0.72,0.85],
      [0.6,0.9],[0.45,0.88],[0.32,0.9],[0.2,0.85],[0.12,0.72],
      [0.1,0.55],[0.18,0.42],[0.28,0.35],[0.22,0.22],[0.35,0.1],[0.5,0.1]
    ]
  },
  {
    name: "Scandinavie",
    diff: "DIFFICILE",
    laps: 3,
    color: "#ff6b6b",
    width: 68,
    points: [
      [0.5,0.08],[0.65,0.08],[0.78,0.14],[0.85,0.26],[0.88,0.4],
      [0.82,0.52],[0.7,0.56],[0.6,0.5],[0.55,0.38],[0.62,0.28],
      [0.72,0.3],[0.75,0.42],[0.68,0.5],[0.58,0.48],[0.52,0.58],
      [0.55,0.7],[0.65,0.78],[0.75,0.82],[0.82,0.75],[0.85,0.62],
      [0.78,0.5],[0.65,0.45],[0.55,0.55],[0.5,0.7],[0.45,0.82],
      [0.35,0.88],[0.22,0.85],[0.14,0.75],[0.1,0.6],[0.12,0.45],
      [0.2,0.32],[0.18,0.2],[0.28,0.12],[0.4,0.08],[0.5,0.08]
    ]
  }
];

// ─── STATE ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const mm = document.getElementById('minimap');
const mctx = mm.getContext('2d');

let W, H, track, scaledPoints, trackPolygon, startPos, startAngle;
let car, keys, touchBtns, gameState, lapTimes, bestLap;
let camX, camY, lastTime, animId;

const TOTAL_LAPS = 3;
const FMT = ms => {
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms%60000)/1000);
  const ms2 = ms%1000;
  return `${m}:${String(s).padStart(2,'0')}.${String(ms2).padStart(3,'0')}`;
};

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (track) buildTrack();
}
window.addEventListener('resize', resize);

// ─── TRACK BUILD ─────────────────────────────────────────────────────────────
function buildTrack() {
  scaledPoints = track.points.map(([x,y]) => [x*W, y*H]);
  // Build thick polygon from centerline
  trackPolygon = buildTrackPolygon(scaledPoints, track.width * Math.min(W,H) / 800);
  // Start/finish = first segment midpoint
  startPos = [...scaledPoints[0]];
  const dx = scaledPoints[1][0]-scaledPoints[0][0];
  const dy = scaledPoints[1][1]-scaledPoints[0][1];
  startAngle = Math.atan2(dy, dx);
}

function buildTrackPolygon(pts, halfW) {
  const left = [], right = [];
  const n = pts.length - 1; // last == first (closed)
  for (let i = 0; i < n; i++) {
    const prev = pts[(i - 1 + n) % n];
    const curr = pts[i];
    const next = pts[(i + 1) % n];
    const dx1 = curr[0]-prev[0], dy1 = curr[1]-prev[1];
    const dx2 = next[0]-curr[0], dy2 = next[1]-curr[1];
    const ang1 = Math.atan2(dy1,dx1);
    const ang2 = Math.atan2(dy2,dx2);
    const ang = (ang1+ang2)/2 + Math.PI/2;
    // miter limit
    const cos = Math.cos(ang1-ang2+Math.PI/2)||0.001;
    const miter = Math.min(halfW/Math.abs(cos), halfW*2.5);
    left.push([curr[0]+Math.cos(ang)*miter, curr[1]+Math.sin(ang)*miter]);
    right.push([curr[0]-Math.cos(ang)*miter, curr[1]-Math.sin(ang)*miter]);
  }
  return {left, right, halfW};
}

// ─── CAR ─────────────────────────────────────────────────────────────────────
function resetCar() {
  car = {
    x: startPos[0],
    y: startPos[1] - trackPolygon.halfW * 0.3,
    angle: startAngle,
    vx: 0, vy: 0,
    speed: 0,
    steer: 0,
    lap: 1,
    lapTime: 0,
    totalTime: 0,
    finished: false,
    lastCheckpoint: -1,
    checkpoints: [],
    offTrackTime: 0,
    drift: 0,
  };
  // Build checkpoints from waypoints
  car.checkpoints = scaledPoints.slice(0, -1).map((_,i) => ({ passed: false, idx: i }));
  car.checkpoints[0].passed = true; // start already passed
}

// ─── POINT IN TRACK ──────────────────────────────────────────────────────────
function distToSegment(px,py, ax,ay, bx,by) {
  const dx=bx-ax, dy=by-ay;
  const t = Math.max(0,Math.min(1, ((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));
  const nx=ax+t*dx-px, ny=ay+t*dy-py;
  return Math.sqrt(nx*nx+ny*ny);
}

function nearestSegmentDist(x,y) {
  const pts = scaledPoints;
  let minD = Infinity;
  for (let i = 0; i < pts.length-1; i++) {
    const d = distToSegment(x,y, pts[i][0],pts[i][1], pts[i+1][0],pts[i+1][1]);
    if (d < minD) minD = d;
  }
  return minD;
}

// ─── CHECKPOINT DETECTION ─────────────────────────────────────────────────────
function checkCheckpoints() {
  const cps = car.checkpoints;
  const n = cps.length;
  for (let i = 1; i < n; i++) {
    if (cps[i].passed) continue;
    const p = scaledPoints[i];
    const d = Math.hypot(car.x-p[0], car.y-p[1]);
    if (d < trackPolygon.halfW * 1.2) {
      // Must pass in order
      if (cps[i-1].passed) cps[i].passed = true;
    }
  }
  // Check finish line (first point)
  if (!cps[n-1].passed) return;
  const fp = scaledPoints[0];
  const d = Math.hypot(car.x-fp[0], car.y-fp[1]);
  if (d < trackPolygon.halfW * 1.4) {
    // All checkpoints passed?
    const allPassed = cps.slice(1).every(c=>c.passed);
    if (allPassed) completeLap();
  }
}

function completeLap() {
  lapTimes.push(car.lapTime);
  if (!bestLap || car.lapTime < bestLap) bestLap = car.lapTime;
  updateLapDisplay();
  car.checkpoints.forEach(c => c.passed = false);
  car.checkpoints[0].passed = true;

  if (car.lap >= TOTAL_LAPS) {
    endGame();
    return;
  }
  car.lap++;
  car.lapTime = 0;
  showMsg("TOUR " + car.lap, 1400);
  document.getElementById('h-lap').textContent = car.lap + ' / ' + TOTAL_LAPS;
}

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
function update(dt) {
  if (!car || gameState !== 'race') return;

  const gas   = keys.up    || touchBtns.gas;
  const brake = keys.down  || touchBtns.brake;
  const left  = keys.left  || touchBtns.left;
  const right = keys.right || touchBtns.right;

  const onTrack = nearestSegmentDist(car.x, car.y) < trackPolygon.halfW;
  const grip = onTrack ? 1.0 : 0.45;
  const maxSpeed = onTrack ? 420 : 180;
  const accel = onTrack ? 280 : 160;
  const brakeForce = 520;
  const steerRate = 2.8;
  const drag = onTrack ? 1.8 : 3.5;

  if (!onTrack) car.offTrackTime += dt;
  else car.offTrackTime = 0;

  // Steering
  let targetSteer = 0;
  if (left)  targetSteer = -1;
  if (right) targetSteer = 1;
  car.steer += (targetSteer - car.steer) * steerRate * dt;

  // Speed
  if (gas)   car.speed += accel * dt;
  if (brake) car.speed -= brakeForce * dt;
  car.speed -= car.speed * drag * dt;
  car.speed = Math.max(0, Math.min(maxSpeed, car.speed));

  // Drift: lateral velocity bleeds off
  const driftGrip = onTrack ? 6 : 3;
  const lateralDecay = Math.exp(-driftGrip * dt);

  // Angle
  if (car.speed > 10) {
    const turnRate = steerRate * car.steer * (car.speed / maxSpeed) * (onTrack ? 1.8 : 1.2);
    car.angle += turnRate * dt * Math.PI;
  }

  // Velocity
  const forward = car.speed;
  const fx = Math.cos(car.angle) * forward;
  const fy = Math.sin(car.angle) * forward;
  car.vx = car.vx * lateralDecay + fx * (1 - lateralDecay);
  car.vy = car.vy * lateralDecay + fy * (1 - lateralDecay);

  car.x += car.vx * dt;
  car.y += car.vy * dt;

  // Drift visual
  const lateral = Math.abs(car.vx * Math.sin(car.angle) - car.vy * Math.cos(car.angle));
  car.drift = lateral / (maxSpeed + 1);

  // Timers
  car.lapTime += dt * 1000;
  car.totalTime += dt * 1000;

  document.getElementById('h-speed').textContent = Math.round(car.speed * 0.3) + ' km/h';
  document.getElementById('h-time').textContent = FMT(car.lapTime);

  checkCheckpoints();

  // Camera follows car
  camX = car.x - W/2;
  camY = car.y - H/2;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function drawTrack() {
  const pts = scaledPoints;
  const hw = trackPolygon.halfW;

  // Ground fill
  ctx.fillStyle = '#2d5a27';
  ctx.fillRect(-camX-100, -camY-100, W+200, H+200); // approximate

  // Draw grass / terrain tiles for visual
  ctx.save();
  ctx.translate(-camX, -camY);

  // Track shadow
  ctx.beginPath();
  ctx.lineWidth = hw * 2 + 12;
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.moveTo(pts[0][0]+4, pts[0][1]+4);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0]+4, pts[i][1]+4);
  ctx.stroke();

  // Track surface
  ctx.beginPath();
  ctx.lineWidth = hw * 2;
  ctx.strokeStyle = '#6b6055';
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.stroke();

  // Center line dashes
  ctx.beginPath();
  ctx.setLineDash([28, 22]);
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(255,255,220,0.35)';
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Track edges (kerbs)
  const drawEdge = (side) => {
    ctx.beginPath();
    ctx.setLineDash([18, 12]);
    ctx.lineWidth = 6;
    ctx.strokeStyle = side === 'l' ? 'rgba(255,80,80,0.7)' : 'rgba(255,255,255,0.5)';
    const arr = side==='l' ? trackPolygon.left : trackPolygon.right;
    ctx.moveTo(arr[0][0], arr[0][1]);
    arr.forEach(p => ctx.lineTo(p[0],p[1]));
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);
  };
  drawEdge('l'); drawEdge('r');

  // Start/finish line
  const sx = pts[0][0], sy = pts[0][1];
  const ang = Math.atan2(pts[1][1]-pts[0][1], pts[1][0]-pts[0][0]);
  const px = Math.cos(ang+Math.PI/2)*hw, py = Math.sin(ang+Math.PI/2)*hw;
  ctx.save();
  ctx.translate(sx,sy);
  ctx.rotate(ang);
  for (let k=0;k<8;k++) {
    ctx.fillStyle = k%2===0?'#fff':'#000';
    ctx.fillRect(-4+k*8, -hw, 8, hw*2);
  }
  ctx.restore();

  ctx.restore();
}

function drawCar() {
  ctx.save();
  ctx.translate(car.x - camX, car.y - camY);
  ctx.rotate(car.angle);

  const cw = 16, ch = 28;

  // Drift smoke
  if (car.drift > 0.15 && car.speed > 60) {
    ctx.save();
    ctx.globalAlpha = Math.min(0.6, car.drift);
    ctx.fillStyle = '#aaa';
    [-cw*0.4, cw*0.4].forEach(ox => {
      ctx.beginPath();
      ctx.arc(ox, ch*0.45, 5 + car.drift*8, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  }

  // Shadow
  ctx.save();
  ctx.translate(3,4);
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  roundRect(ctx, -cw, -ch, cw*2, ch*2, 5);
  ctx.fill();
  ctx.restore();

  // Body
  const bodyGrad = ctx.createLinearGradient(-cw,-ch,cw,ch);
  bodyGrad.addColorStop(0, track.color);
  bodyGrad.addColorStop(1, shadeColor(track.color, -40));
  ctx.fillStyle = bodyGrad;
  roundRect(ctx, -cw, -ch, cw*2, ch*2, 5);
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(180,230,255,0.7)';
  roundRect(ctx, -cw*0.7, -ch*0.6, cw*1.4, ch*0.45, 3);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  [[-cw-3,-ch*0.5],[cw+3,-ch*0.5],[-cw-3,ch*0.3],[cw+3,ch*0.3]].forEach(([wx,wy]) => {
    ctx.fillRect(wx-3, wy-7, 6, 14);
  });

  // Number plate
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('1', 0, 6);

  ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);
  c.closePath();
}

function shadeColor(hex, amt) {
  let r=parseInt(hex.slice(1,3),16)+amt;
  let g=parseInt(hex.slice(3,5),16)+amt;
  let b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function drawMinimap() {
  const mw = mm.width, mh = mm.height;
  mctx.clearRect(0,0,mw,mh);

  // Background
  mctx.fillStyle = 'rgba(0,0,0,0.4)';
  mctx.fillRect(0,0,mw,mh);

  // Find bounds
  const xs = scaledPoints.map(p=>p[0]), ys = scaledPoints.map(p=>p[1]);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const pad = 8;
  const sx = (mw-pad*2)/(maxX-minX), sy = (mh-pad*2)/(maxY-minY);
  const sc = Math.min(sx,sy);
  const ox = pad + (mw-pad*2-(maxX-minX)*sc)/2;
  const oy = pad + (mh-pad*2-(maxY-minY)*sc)/2;
  const tp = p => [(p[0]-minX)*sc+ox, (p[1]-minY)*sc+oy];

  // Track
  mctx.beginPath();
  mctx.lineWidth = trackPolygon.halfW * sc * 2;
  mctx.strokeStyle = '#555';
  mctx.lineJoin = 'round';
  mctx.lineCap = 'round';
  const [fx,fy] = tp(scaledPoints[0]);
  mctx.moveTo(fx,fy);
  for (let i=1;i<scaledPoints.length;i++) { const [x,y]=tp(scaledPoints[i]); mctx.lineTo(x,y); }
  mctx.stroke();

  // Car dot
  const [cx,cy] = [(car.x-minX)*sc+ox, (car.y-minY)*sc+oy];
  mctx.beginPath();
  mctx.arc(cx,cy,3,0,Math.PI*2);
  mctx.fillStyle = track.color;
  mctx.fill();
}

function drawGrass() {
  // Tiled grass background
  ctx.save();
  ctx.translate(-camX, -camY);
  const size = 60;
  const offX = Math.floor(0/size)*size;
  const offY = Math.floor(0/size)*size;
  ctx.fillStyle = '#2d5a27';
  ctx.fillRect(offX-size, offY-size, W+size*3, H+size*3);

  // Subtle pattern
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  for (let x=offX-size; x<offX+W+size*2; x+=size) {
    ctx.beginPath(); ctx.moveTo(x,-100); ctx.lineTo(x,H+200); ctx.stroke();
  }
  for (let y=offY-size; y<offY+H+size*2; y+=size) {
    ctx.beginPath(); ctx.moveTo(-100,y); ctx.lineTo(W+200,y); ctx.stroke();
  }
  ctx.restore();
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function gameLoop(ts) {
  animId = requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - (lastTime||ts)) / 1000, 0.05);
  lastTime = ts;

  if (gameState === 'race' || gameState === 'countdown') {
    ctx.clearRect(0,0,W,H);
    drawGrass();
    drawTrack();
    if (gameState === 'race') {
      update(dt);
      drawCar();
      drawMinimap();
    }
  }
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
function startCountdown() {
  gameState = 'countdown';
  let count = 3;
  showMsg(String(count), 800);
  const iv = setInterval(() => {
    count--;
    if (count > 0) showMsg(String(count), 800);
    else {
      clearInterval(iv);
      showMsg('GO !', 900);
      gameState = 'race';
    }
  }, 1000);
}

// ─── MSG FLASH ────────────────────────────────────────────────────────────────
let msgTimer;
function showMsg(txt, dur) {
  const el = document.getElementById('msg-text');
  el.textContent = txt;
  el.style.opacity = '1';
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => el.style.opacity='0', dur);
}

// ─── LAP DISPLAY ─────────────────────────────────────────────────────────────
function updateLapDisplay() {
  const el = document.getElementById('lap-times');
  el.innerHTML = lapTimes.map((t,i) => {
    const isBest = t === bestLap;
    return `<div class="lap-row${isBest?' best':''}">T${i+1} ${FMT(t)}${isBest?' ★':''}</div>`;
  }).join('');
}

// ─── END GAME ────────────────────────────────────────────────────────────────
function endGame() {
  gameState = 'end';
  car.finished = true;
  showMsg('ARRIVEE !', 2000);
  setTimeout(() => {
    cancelAnimationFrame(animId);
    document.getElementById('screen-end').style.display = 'flex';
    document.getElementById('end-title').textContent = TOTAL_LAPS + ' TOURS TERMINES';
    const stats = document.getElementById('end-stats');
    stats.innerHTML = `
      <div class="stat-box"><div class="sv">${FMT(car.totalTime)}</div><div class="sl">Temps total</div></div>
      <div class="stat-box"><div class="sv">${FMT(bestLap)}</div><div class="sl">Meilleur tour</div></div>
      <div class="stat-box"><div class="sv">${Math.round(car.totalTime/TOTAL_LAPS/1000)}s</div><div class="sl">Moy. par tour</div></div>
      <div class="stat-box"><div class="sv">${Math.round(420*0.3)}</div><div class="sl">Vit. max km/h</div></div>
    `;
  }, 2200);
}

// ─── INIT GAME ────────────────────────────────────────────────────────────────
function initGame(trackIdx) {
  track = TRACKS[trackIdx];
  lapTimes = [];
  bestLap = null;
  resize();
  resetCar();
  camX = car.x - W/2;
  camY = car.y - H/2;
  document.getElementById('h-lap').textContent = '1 / ' + TOTAL_LAPS;
  document.getElementById('h-time').textContent = '0:00.000';
  document.getElementById('h-speed').textContent = '0';
  document.getElementById('lap-times').innerHTML = '';
  document.getElementById('screen-menu').style.display = 'none';
  document.getElementById('screen-end').style.display = 'none';
  lastTime = null;
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(gameLoop);
  setTimeout(startCountdown, 200);
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
keys = { up:false, down:false, left:false, right:false };
touchBtns = { gas:false, brake:false, left:false, right:false };

window.addEventListener('keydown', e => {
  if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') keys.up=true;
  if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') keys.down=true;
  if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
  if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') keys.up=false;
  if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') keys.down=false;
  if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
  if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
});

function bindBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); touchBtns[key]=true; el.classList.add('pressed'); }, {passive:false});
  el.addEventListener('touchend',   e => { e.preventDefault(); touchBtns[key]=false; el.classList.remove('pressed'); }, {passive:false});
  el.addEventListener('mousedown', () => { touchBtns[key]=true; el.classList.add('pressed'); });
  el.addEventListener('mouseup',   () => { touchBtns[key]=false; el.classList.remove('pressed'); });
}
bindBtn('btn-gas','gas'); bindBtn('btn-brake','brake');
bindBtn('btn-left','left'); bindBtn('btn-right','right');

// ─── MENU SETUP ──────────────────────────────────────────────────────────────
let selectedTrack = 0;
const trackSel = document.getElementById('track-select');
TRACKS.forEach((t,i) => {
  const card = document.createElement('div');
  card.className = 'track-card' + (i===0?' active':'');
  card.innerHTML = `<div class="t-name">${t.name}</div><div class="t-diff" style="color:${t.color}">${t.diff}</div>`;
  card.addEventListener('click', () => {
    selectedTrack = i;
    document.querySelectorAll('.track-card').forEach((c,j) => c.classList.toggle('active', j===i));
  });
  trackSel.appendChild(card);
});

document.getElementById('btn-start').addEventListener('click', () => initGame(selectedTrack));

document.getElementById('btn-replay').addEventListener('click', () => {
  document.getElementById('screen-end').style.display = 'none';
  initGame(selectedTrack);
});
document.getElementById('btn-menu2').addEventListener('click', () => {
  document.getElementById('screen-end').style.display = 'none';
  document.getElementById('screen-menu').style.display = 'flex';
  gameState = 'menu';
});

// Resize canvas once
resize();
</script>
