<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Projet Corps"/>
  <title>Projet Corps</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:#0f1117;height:100%;overscroll-behavior:none}
    body{font-family:'Inter','Helvetica Neue',Arial,sans-serif;color:#f0f4ff}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    ::-webkit-scrollbar{display:none}
    textarea:focus,input:focus{outline:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;
const GOAL=71.5,START_W=74.7,START_D="2026-03-11";
const DEF_PLAN=[
  {day:"Lundi",    type:"Marche",desc:"30 min marche rapide + 10 min gainage",emoji:"🚶",color:"#3ecfcf"},
  {day:"Mardi",    type:"Muscu", desc:"Pompes / Squats / Fentes - 3x15",      emoji:"💪",color:"#ff6b6b"},
  {day:"Mercredi", type:"Marche",desc:"30-40 min marche active",               emoji:"🚶",color:"#3ecfcf"},
  {day:"Jeudi",    type:"Muscu", desc:"Gainage / Dips / Fentes - 3x15",       emoji:"💪",color:"#ff6b6b"},
  {day:"Vendredi", type:"Cardio",desc:"Velo / Natation / Ski - 40 min",       emoji:"🚴",color:"#a8e063"},
  {day:"Samedi",   type:"Actif", desc:"Sport plaisir ou longue marche",        emoji:"⛷️",color:"#f7b731"},
  {day:"Dimanche", type:"Repos", desc:"Recuperation - etirements 10 min",      emoji:"😌",color:"#b8b8ff"},
];
const DEF_MENUS=[
  {title:"Lundi",   menu:"Filet de cabillaud + haricots verts + fromage blanc"},
  {title:"Mardi",   menu:"Omelette 3 oeufs + epinards + salade"},
  {title:"Mercredi",menu:"Poulet grille + brocoli + huile d'olive"},
  {title:"Jeudi",   menu:"Saumon + courgettes + yaourt grec"},
  {title:"Vendredi",menu:"Steak + salade verte + noix"},
  {title:"Samedi",  menu:"Repas social - proteines en priorite"},
  {title:"Dimanche",menu:"Soupe legumes + oeufs durs + fruit"},
];
const HABITS=[
  {id:"sleep",  label:"7h30+ de sommeil",       emoji:"🌙", points:20,color:"#b8b8ff"},
  {id:"water",  label:"1,5L d'eau",              emoji:"💧", points:10,color:"#3ecfcf"},
  {id:"steps",  label:"8000 pas",                emoji:"👟", points:15,color:"#a8e063"},
  {id:"nosugar",label:"Zero sucre liquide",      emoji:"🚫", points:20,color:"#ff6b6b"},
  {id:"protein",label:"Proteines le matin",      emoji:"🥚", points:10,color:"#f7b731"},
  {id:"nofec",  label:"Pas de feculents le soir",emoji:"🍽️",points:10,color:"#f7b731"},
  {id:"gainage",label:"Gainage (3x45 sec)",      emoji:"🔥", points:15,color:"#ff6b6b"},
];
const BG="#0f1117",CARD="#181c27",BORDER="#252a3a",TEXT="#f0f4ff",MUTED="#6b7299",ACCENT="#3ecfcf";
const TOTAL=HABITS.reduce((s,h)=>s+h.points,0);
const todayStr=()=>new Date().toISOString().split("T")[0];
const daysSince=d=>Math.floor((new Date()-new Date(d))/86400000);
const offsetDate=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];};
const fmtDate=s=>new Date(s+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
const getMot=p=>{
  if(p>=90)return{text:"Legendaire. Le corps enregistre.",color:"#a8e063"};
  if(p>=70)return{text:"Solide. Le cap tient.",color:"#3ecfcf"};
  if(p>=40)return{text:"Continue, chaque geste compte.",color:"#f7b731"};
  return{text:"Un nouveau depart commence maintenant.",color:"#b8b8ff"};
};
const ls={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

function Modal({title,value,onSave,onClose}){
  const[val,setVal]=useState(value);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#1e2235",borderRadius:"20px 20px 0 0",padding:"24px 20px",width:"100%",maxWidth:480,border:"1px solid #2e3450",paddingBottom:"max(20px,env(safe-area-inset-bottom))"}}>
        <div style={{width:40,height:4,background:"#2e3450",borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{fontSize:"0.7rem",letterSpacing:"0.18em",color:MUTED,textTransform:"uppercase",marginBottom:12}}>{title}</div>
        <textarea value={val} onChange={e=>setVal(e.target.value)} rows={3} style={{width:"100%",background:BG,border:"1px solid #2e3450",borderRadius:10,padding:"12px 14px",color:TEXT,fontSize:"0.95rem",fontFamily:"Inter,sans-serif",resize:"none",lineHeight:1.6}}/>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button onClick={onClose} style={{flex:1,background:"transparent",border:"1px solid #2e3450",borderRadius:10,padding:"12px",color:MUTED,cursor:"pointer",fontSize:"0.9rem",fontFamily:"Inter,sans-serif"}}>Annuler</button>
          <button onClick={()=>{onSave(val);onClose();}} style={{flex:2,background:ACCENT,border:"none",borderRadius:10,padding:"12px",color:BG,fontWeight:"700",cursor:"pointer",fontSize:"0.9rem",fontFamily:"Inter,sans-serif"}}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("dashboard");
  const[history,setHistory]=useState({});
  const[weights,setWeights]=useState([]);
  const[newW,setNewW]=useState("");
  const[offset,setOffset]=useState(0);
  const[plan,setPlan]=useState(DEF_PLAN);
  const[menus,setMenus]=useState(DEF_MENUS);
  const[edit,setEdit]=useState(null);

  useEffect(()=>{
    setHistory(ls.get("hh")||{});
    setWeights(ls.get("ww")||[]);
    const p=ls.get("pp");if(p)setPlan(p);
    const m=ls.get("mm");if(m)setMenus(m);
  },[]);

  const activeDate=offsetDate(offset);
  const ah=history[activeDate]||{};
  const toggle=useCallback(id=>{
    const dh=history[activeDate]||{};
    const up={...history,[activeDate]:{...dh,[id]:!dh[id]}};
    setHistory(up);ls.set("hh",up);
  },[history,activeDate]);

  const addW=()=>{
    const v=parseFloat(newW.replace(",","."));
    if(isNaN(v)||v<50||v>120)return;
    const up=[...weights.filter(w=>w.date!==todayStr()),{date:todayStr(),weight:v}].sort((a,b)=>a.date.localeCompare(b.date));
    setWeights(up);setNewW("");ls.set("ww",up);
  };

  const savePlan=p=>{setPlan(p);ls.set("pp",p);};
  const saveMen=m=>{setMenus(m);ls.set("mm",m);};

  const score=HABITS.reduce((s,h)=>s+(ah[h.id]?h.points:0),0);
  const pct=Math.round((score/TOTAL)*100);
  const mot=getMot(pct);
  const latest=weights.length>0?weights[weights.length-1].weight:START_W;
  const lost=START_W-latest;
  const rem=latest-GOAL;
  const prog=Math.min(100,Math.max(0,((START_W-latest)/(START_W-GOAL))*100));
  const days=daysSince(START_D);

  const week=(()=>{
    const s=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const key=d.toISOString().split("T")[0];
      const h=history[key]||{};
      const pts=HABITS.reduce((sum,hab)=>sum+(h[hab.id]?hab.points:0),0);
      s.push({key,pct:Math.round((pts/TOTAL)*100),label:["D","L","M","Me","J","V","S"][d.getDay()]});
    }
    return s;
  })();
  const avg=week.length?Math.round(week.reduce((s,d)=>s+d.pct,0)/week.length):0;
  const TABS=[["dashboard","📊","Vue"],["today","✓","Habits"],["weights","⚖️","Poids"],["program","📋","Plan"]];
  const C={card:{background:CARD,borderRadius:16,padding:20,marginBottom:14,border:`1px solid ${BORDER}`},lbl:{fontSize:"0.62rem",letterSpacing:"0.18em",color:MUTED,textTransform:"uppercase",marginBottom:12}};

  return(
    <div style={{background:BG,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:"calc(68px + env(safe-area-inset-bottom))"}}>
      {edit&&<Modal title={edit.title} value={edit.value} onClose={()=>setEdit(null)}
        onSave={v=>{
          if(edit.type==="sport")savePlan(plan.map((p,i)=>i===edit.idx?{...p,desc:v}:p));
          else saveMen(menus.map((m,i)=>i===edit.idx?{...m,menu:v}:m));
        }}/>}

      <div style={{padding:"calc(env(safe-area-inset-top,0px) + 24px) 20px 20px",background:"linear-gradient(160deg,#1a1f35,#0f1117)",borderBottom:`1px solid ${BORDER}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:"0.62rem",letterSpacing:"0.22em",color:MUTED,textTransform:"uppercase",marginBottom:6}}>Projet Corps · J+{days}</div>
            <div style={{fontSize:"2rem",fontWeight:"800",color:TEXT,letterSpacing:"-0.03em",lineHeight:1}}>
              {latest.toFixed(1)} <span style={{fontSize:"1rem",fontWeight:"500",color:MUTED}}>kg</span>
            </div>
            <div style={{fontSize:"0.8rem",color:MUTED,marginTop:6}}>
              {lost>0?<span style={{color:"#a8e063"}}>-{lost.toFixed(1)} kg</span>:"Depart 74,7 kg"} · objectif <span style={{color:ACCENT}}>{GOAL} kg</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"1.6rem",fontWeight:"800",color:ACCENT}}>{prog.toFixed(0)}<span style={{fontSize:"0.9rem",fontWeight:"500"}}>%</span></div>
            <div style={{fontSize:"0.7rem",color:MUTED,marginTop:2}}>en route</div>
          </div>
        </div>
        <div style={{marginTop:16,background:"#252a3a",borderRadius:99,height:8,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(90deg,#ff6b6b,#f7b731,#a8e063)",width:`${prog}%`,height:"100%",borderRadius:99,transition:"width 1s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
          <span style={{fontSize:"0.62rem",color:"#3a4060"}}>74,7 kg</span>
          <span style={{fontSize:"0.62rem",color:"#3a4060"}}>{GOAL} kg</span>
        </div>
      </div>

      <div style={{display:"flex",background:BG,borderBottom:`1px solid ${BORDER}`,padding:"0 4px",position:"sticky",top:0,zIndex:10}}>
        {TABS.map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px 2px",background:"none",border:"none",cursor:"pointer",color:tab===id?ACCENT:MUTED,fontSize:"0.62rem",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"Inter,sans-serif",fontWeight:tab===id?"700":"400",borderBottom:tab===id?`2px solid ${ACCENT}`:"2px solid transparent",transition:"all 0.2s"}}>
            <div style={{fontSize:"1rem",marginBottom:2}}>{icon}</div>{label}
          </button>
        ))}
      </div>

      {tab==="dashboard"&&(
        <div style={{padding:"20px 16px"}}>
          <div style={C.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <span style={{fontSize:"0.62rem",letterSpacing:"0.18em",color:MUTED,textTransform:"uppercase"}}>Cette semaine</span>
              <span style={{fontSize:"0.8rem",color:ACCENT,fontWeight:"700"}}>{avg}% moy.</span>
            </div>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,height:72}}>
              {week.map((d,i)=>{
                const isT=d.key===todayStr();
                const bc=d.pct>=70?"#a8e063":d.pct>=40?"#f7b731":d.pct>0?"#ff6b6b":"#252a3a";
                return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  {d.pct>0&&<div style={{fontSize:"0.52rem",color:MUTED}}>{d.pct}%</div>}
                  <div style={{width:"100%",background:bc,opacity:isT?1:0.65,borderRadius:5,height:`${Math.max(6,(d.pct/100)*52)}px`}}/>
                  <div style={{fontSize:"0.62rem",color:isT?ACCENT:MUTED,fontWeight:isT?"700":"400"}}>{d.label}</div>
                </div>);
              })}
            </div>
          </div>
          <div style={C.card}>
            <div style={C.lbl}>Courbe de poids</div>
            {weights.length<2?<div style={{color:MUTED,fontSize:"0.85rem",textAlign:"center",padding:"16px 0"}}>Enregistre au moins 2 pesees 📈</div>:(
              <svg viewBox="0 0 300 80" style={{width:"100%",overflow:"visible"}}>
                {(()=>{
                  const l8=weights.slice(-8),vals=l8.map(w=>w.weight);
                  const minV=Math.min(...vals,GOAL)-0.5,maxV=Math.max(...vals)+0.5;
                  const px=i=>(i/(l8.length-1))*270+15,py=v=>70-((v-minV)/(maxV-minV))*58,gy=py(GOAL);
                  return(<>
                    <line x1="0" y1={gy} x2="300" y2={gy} stroke="#a8e063" strokeWidth="1.5" strokeDasharray="5,4" opacity="0.5"/>
                    <text x="4" y={gy-4} fill="#a8e063" fontSize="7.5" opacity="0.8">objectif</text>
                    <polyline points={l8.map((w,i)=>`${px(i)},${py(w.weight)}`).join(" ")} fill="none" stroke={ACCENT} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
                    {l8.map((w,i)=><g key={i}><circle cx={px(i)} cy={py(w.weight)} r="4" fill={ACCENT}/><text x={px(i)} y={py(w.weight)-8} fill={TEXT} fontSize="7.5" textAnchor="middle">{w.weight}</text></g>)}
                  </>);
                })()}
              </svg>
            )}
          </div>
          <div style={C.card}>
            <div style={C.lbl}>Rappels de la journee</div>
            {[
              {time:"7h00", text:"Pesee a jeun + 1er verre d'eau",              emoji:"⚖️",color:"#b8b8ff"},
              {time:"8h30", text:"Petit-dej proteine",                           emoji:"🥚",color:"#f7b731"},
              {time:"11h00",text:"2eme verre d'eau",                             emoji:"💧",color:ACCENT},
              {time:"12h30",text:"Dejeuner : proteines + legumes + feculent OK", emoji:"🍽️",color:"#a8e063"},
              {time:"15h00",text:"4eme verre d'eau",                             emoji:"💧",color:ACCENT},
              {time:"18h00",text:"Sport ou marche si programme",                 emoji:"🏃",color:"#ff6b6b"},
              {time:"19h00",text:"Derniere fenetre si jeune 10h",                emoji:"⏰",color:"#f7b731"},
              {time:"22h30",text:"Ecran off - prepare ton sommeil",              emoji:"🌙",color:"#b8b8ff"},
            ].map((r,i,arr)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,paddingBottom:12,borderBottom:i<arr.length-1?`1px solid ${BORDER}`:"none"}}>
                <div style={{fontSize:"0.68rem",color:r.color,fontWeight:"700",minWidth:38}}>{r.time}</div>
                <span style={{fontSize:"1.1rem"}}>{r.emoji}</span>
                <div style={{fontSize:"0.82rem",color:"#c8d0f0"}}>{r.text}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="today"&&(
        <div style={{padding:"20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,background:CARD,borderRadius:14,padding:"12px 16px",border:`1px solid ${BORDER}`}}>
            <button onClick={()=>setOffset(o=>o-1)} style={{background:"none",border:"none",color:ACCENT,cursor:"pointer",fontSize:"1.5rem",padding:"0 6px",lineHeight:1}}>&#8249;</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:"0.9rem",color:TEXT,fontWeight:"600",textTransform:"capitalize"}}>{fmtDate(activeDate)}</div>
              <div style={{fontSize:"0.6rem",letterSpacing:"0.14em",marginTop:3,color:offset===0?ACCENT:offset===-1?MUTED:"#3a4060",textTransform:"uppercase"}}>
                {offset===0?"Aujourd'hui":offset===-1?"Hier":`Il y a ${Math.abs(offset)} jours`}
              </div>
            </div>
            <button onClick={()=>setOffset(o=>Math.min(0,o+1))} style={{background:"none",border:"none",color:offset<0?ACCENT:"#252a3a",cursor:offset<0?"pointer":"default",fontSize:"1.5rem",padding:"0 6px",lineHeight:1}}>&#8250;</button>
          </div>
          <div style={{background:"linear-gradient(135deg,#1a2535,#1a1f35)",borderRadius:16,padding:"20px",marginBottom:16,border:`1px solid ${BORDER}`}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:8,marginBottom:10}}>
              <div style={{fontSize:"3rem",fontWeight:"800",color:TEXT,lineHeight:1,letterSpacing:"-0.03em"}}>{score}</div>
              <div style={{fontSize:"1rem",color:MUTED,marginBottom:8}}>/ {TOTAL} pts</div>
            </div>
            <div style={{fontSize:"0.9rem",color:mot.color,fontWeight:"600",marginBottom:14}}>{mot.text}</div>
            <div style={{background:"#252a3a",borderRadius:99,height:10,overflow:"hidden"}}>
              <div style={{background:pct>=70?"linear-gradient(90deg,#3ecfcf,#a8e063)":pct>=40?"linear-gradient(90deg,#f7b731,#ff9f43)":"linear-gradient(90deg,#ff6b6b,#ee5a24)",width:`${pct}%`,height:"100%",borderRadius:99,transition:"width 0.5s ease"}}/>
            </div>
          </div>
          <div style={C.lbl}>Habitudes du jour</div>
          {HABITS.map(h=>{
            const done=!!ah[h.id];
            return(<button key={h.id} onClick={()=>toggle(h.id)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",background:done?`${h.color}18`:CARD,border:`1.5px solid ${done?h.color:BORDER}`,borderRadius:12,padding:"14px 16px",marginBottom:10,cursor:"pointer",transition:"all 0.2s",textAlign:"left",fontFamily:"Inter,sans-serif"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:"1.4rem"}}>{h.emoji}</span>
                <div>
                  <div style={{fontSize:"0.9rem",color:done?TEXT:MUTED,fontWeight:done?"600":"400"}}>{h.label}</div>
                  <div style={{fontSize:"0.68rem",color:done?h.color:"#3a4060",marginTop:2,fontWeight:"600"}}>+{h.points} pts</div>
                </div>
              </div>
              <div style={{width:26,height:26,borderRadius:"50%",background:done?h.color:"transparent",border:`2px solid ${done?h.color:BORDER}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>
                {done&&<span style={{fontSize:"0.75rem",color:BG,fontWeight:"bold"}}>✓</span>}
              </div>
            </button>);
          })}
          <div style={{marginTop:16,background:CARD,borderRadius:12,padding:16,border:`1px solid ${BORDER}`}}>
            <div style={{fontSize:"0.78rem",color:MUTED,lineHeight:1.7}}>Regle des 80% — <span style={{color:ACCENT,fontWeight:"600"}}>pas besoin d'etre parfait.</span> 8 jours sur 10 = resultats visibles en 6 semaines.</div>
          </div>
        </div>
      )}

      {tab==="weights"&&(
        <div style={{padding:"20px 16px"}}>
          <div style={C.card}>
            <div style={C.lbl}>Nouvelle pesee</div>
            <div style={{fontSize:"0.78rem",color:MUTED,marginBottom:14}}>📌 Le matin, a jeun, apres les toilettes</div>
            <div style={{display:"flex",gap:10}}>
              <input type="number" step="0.1" min="50" max="120" placeholder="74.2" value={newW} onChange={e=>setNewW(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addW()}
                style={{flex:1,background:BG,border:`1.5px solid ${BORDER}`,borderRadius:10,padding:"12px 14px",color:TEXT,fontSize:"1.2rem",fontFamily:"Inter,sans-serif",fontWeight:"600"}}/>
              <button onClick={addW} style={{background:ACCENT,border:"none",borderRadius:10,padding:"12px 22px",color:BG,fontWeight:"800",cursor:"pointer",fontSize:"1rem",fontFamily:"Inter,sans-serif"}}>+</button>
            </div>
          </div>
          <div style={C.card}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:"0.78rem"}}>
              <span style={{color:MUTED}}>Depart {START_W} kg</span>
              <span style={{color:"#a8e063",fontWeight:"600"}}>Objectif {GOAL} kg 🎯</span>
            </div>
            <div style={{background:"#252a3a",borderRadius:99,height:14,overflow:"hidden",marginBottom:10}}>
              <div style={{background:"linear-gradient(90deg,#ff6b6b,#f7b731,#a8e063)",width:`${prog}%`,height:"100%",borderRadius:99,transition:"width 1s ease"}}/>
            </div>
            <div style={{fontSize:"1.1rem",color:TEXT,fontWeight:"700"}}>{prog.toFixed(0)}% accompli — <span style={{color:ACCENT}}>{rem.toFixed(1)} kg restants</span></div>
          </div>
          <div style={C.card}>
            <div style={C.lbl}>Historique</div>
            {weights.length===0?<div style={{color:MUTED,fontSize:"0.85rem",textAlign:"center",padding:"12px 0"}}>Aucune pesee enregistree</div>:(
              [...weights].reverse().slice(0,10).map((w,i)=>{
                const prev=weights[weights.length-1-i-1];
                const diff=prev?w.weight-prev.weight:0;
                return(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${BORDER}`}}>
                  <span style={{fontSize:"0.8rem",color:MUTED}}>{w.date}</span>
                  <span style={{fontSize:"1rem",color:TEXT,fontWeight:"700"}}>{w.weight} kg</span>
                  {prev&&<span style={{fontSize:"0.82rem",fontWeight:"600",color:diff<0?"#a8e063":diff>0?"#ff6b6b":MUTED}}>{diff<0?`-${Math.abs(diff).toFixed(1)}`:diff>0?`+${diff.toFixed(1)}`:"="}</span>}
                </div>);
              })
            )}
          </div>
        </div>
      )}

      {tab==="program"&&(
        <div style={{padding:"20px 16px"}}>
          <div style={{fontSize:"0.62rem",letterSpacing:"0.18em",color:MUTED,textTransform:"uppercase",marginBottom:4}}>Programme hebdomadaire</div>
          <div style={{fontSize:"0.75rem",color:MUTED,marginBottom:16}}>Appuie pour modifier ✏️</div>
          {plan.map((day,i)=>(
            <button key={i} onClick={()=>setEdit({type:"sport",idx:i,title:`Modifier - ${day.day}`,value:day.desc})}
              style={{display:"block",width:"100%",background:CARD,borderRadius:12,padding:"14px 16px",marginBottom:10,border:`1px solid ${BORDER}`,borderLeft:`3px solid ${day.color}`,cursor:"pointer",textAlign:"left",fontFamily:"Inter,sans-serif"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:"0.68rem",letterSpacing:"0.12em",color:day.color,textTransform:"uppercase",marginBottom:4,fontWeight:"700"}}>{day.emoji} {day.day}</div>
                  <div style={{fontSize:"0.92rem",color:TEXT,fontWeight:"600"}}>{day.type}</div>
                  <div style={{fontSize:"0.78rem",color:MUTED,marginTop:3}}>{day.desc}</div>
                </div>
                <span style={{color:MUTED,fontSize:"0.8rem"}}>✏️</span>
              </div>
            </button>
          ))}
          <div style={{background:CARD,borderRadius:16,padding:20,marginTop:6,border:`1px solid ${BORDER}`}}>
            <div style={{fontSize:"0.62rem",letterSpacing:"0.18em",color:MUTED,textTransform:"uppercase",marginBottom:4}}>Menu type - soir</div>
            <div style={{fontSize:"0.75rem",color:MUTED,marginBottom:14}}>Appuie pour modifier ✏️</div>
            {menus.map((m,i)=>(
              <button key={i} onClick={()=>setEdit({type:"menu",idx:i,title:`Menu du soir - ${m.title}`,value:m.menu})}
                style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start",width:"100%",background:"transparent",border:`1px solid ${BORDER}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left",fontFamily:"Inter,sans-serif"}}>
                <span style={{fontSize:"0.68rem",color:ACCENT,minWidth:62,fontFamily:"monospace",paddingTop:2,fontWeight:"700"}}>{m.title}</span>
                <span style={{fontSize:"0.82rem",color:MUTED,lineHeight:1.5,flex:1}}>{m.menu}</span>
                <span style={{color:"#3a4060",fontSize:"0.75rem"}}>✏️</span>
              </button>
            ))}
          </div>
        </div>
      )}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(15,17,23,0.96)",backdropFilter:"blur(12px)",borderTop:`1px solid ${BORDER}`,display:"flex",justifyContent:"space-around",padding:"8px 0",paddingBottom:"max(10px,env(safe-area-inset-bottom))"}}>
        {TABS.map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",color:tab===id?ACCENT:MUTED,padding:"4px 16px",fontFamily:"Inter,sans-serif",transition:"color 0.2s"}}>
            <span style={{fontSize:"1.15rem"}}>{icon}</span>
            <span style={{fontSize:"0.58rem",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:tab===id?"700":"400"}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
